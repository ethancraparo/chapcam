<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>ChapCam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── Welcome ── -->
  <div id="screen-welcome" class="screen active">
    <div class="welcome-content">
      <div class="camera-icon">
        <svg viewBox="0 0 100 80" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5" y="18" width="90" height="58" rx="9" stroke="currentColor" stroke-width="4.5"/>
          <circle cx="50" cy="47" r="19" stroke="currentColor" stroke-width="4.5"/>
          <circle cx="50" cy="47" r="9" fill="currentColor"/>
          <rect x="34" y="7" width="22" height="15" rx="5" fill="currentColor"/>
          <circle cx="80" cy="31" r="4.5" fill="currentColor"/>
        </svg>
      </div>
      <h1 class="logo-text">ChapCam</h1>
      <p class="logo-sub">Wedding Disposable</p>
      <div class="welcome-btns">
        <button class="btn-shutter" id="start-btn">Open Camera</button>
        <button class="btn-ghost" id="feed-btn">View Photos</button>
      </div>
    </div>
  </div>

  <!-- ── Camera ── -->
  <div id="screen-camera" class="screen">
    <div class="viewfinder-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="grain-canvas"></canvas>
      <div class="vignette"></div>
      <div id="flash" class="flash"></div>
      <div class="film-counter" id="film-counter">000</div>
    </div>
    <div class="cam-controls">
      <button class="ctrl-btn" id="feed-link">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
        <span>Feed</span>
      </button>
      <button class="shutter" id="shutter" aria-label="Take photo"></button>
      <button class="ctrl-btn" id="flip-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        <span>Flip</span>
      </button>
    </div>
  </div>

  <!-- ── Preview ── -->
  <div id="screen-preview" class="screen">
    <div class="preview-content">
      <div class="polaroid-wrap">
        <div class="polaroid">
          <img id="preview-img" src="" alt="Preview">
        </div>
      </div>
      <div class="preview-btns">
        <button class="btn-ghost" id="retake-btn">Retake</button>
        <button class="btn-shutter" id="use-btn">Use Photo</button>
      </div>
    </div>
  </div>

  <!-- ── Feed ── -->
  <div id="screen-feed" class="screen">
    <div class="feed-bar">
      <button class="back-btn" id="back-to-cam">← Camera</button>
      <span class="feed-title">ChapCam</span>
      <div style="width:80px"></div>
    </div>
    <div class="feed-scroll" id="feed-grid">
      <p class="empty-state">Loading…</p>
    </div>
  </div>

  <!-- ── Album download ── -->
  <div id="screen-admin" class="screen">
    <div class="admin-panel" id="admin-panel">
      <div class="feed-bar">
        <button class="back-btn" id="admin-home">← Home</button>
        <span class="feed-title">All Photos</span>
        <div style="width:80px"></div>
      </div>
      <div class="admin-meta">
        <p id="admin-stats">Loading…</p>
        <button class="btn-shutter" id="download-btn">Download All Photos</button>
      </div>
      <div class="feed-scroll" id="admin-grid"></div>
    </div>
  </div>

  <!-- ── Upload overlay ── -->
  <div id="overlay" class="overlay hidden">
    <div class="overlay-box">
      <div class="spinner"></div>
      <p>Developing film…</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
